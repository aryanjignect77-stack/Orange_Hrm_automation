name: Run Selenium Tests

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Install Chrome
      uses: browser-actions/setup-chrome@v1

    - name: Run Selenium tests with Allure
      run: |
        pytest --alluredir=allure-results

    # Install Allure CLI
    - name: Install Allure
      run: |
        sudo apt-get update
        sudo apt-get install -y default-jre
        wget https://github.com/allure-framework/allure2/releases/latest/download/allure-2.29.0.tgz
        tar -zxvf allure-2.29.0.tgz
        sudo mv allure-2.29.0 /opt/allure
        sudo ln -s /opt/allure/bin/allure /usr/bin/allure

    # Generate report
    - name: Generate Allure Report
      run: |
        allure generate allure-results --clean -o allure-report

    # Upload report even if tests fail
    - name: Upload Allure Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report